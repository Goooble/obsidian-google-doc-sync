<!doctype html>
<html>
	<body>
		<script>
			const params = new URLSearchParams(window.location.search);

			const code = params.get('code');
			const state = params.get('state');
			const error = params.get('error');

			if (error) {
				window.location = `obsidian://gdocs-sync/oauth?error=${encodeURIComponent(error)}`;
			} else {
				window.location = `obsidian://gdocs-sync/oauth?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`;
			}
		</script>

		Redirecting back to Obsidian...
	</body>
</html>
